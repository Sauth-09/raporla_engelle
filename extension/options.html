<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetKalkan Ayarları</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --primary-color: #4361ee;
            --border-color: #ddd;
            --card-bg: #fff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f0f0f0;
                --primary-color: #4cc9f0;
                --border-color: #333;
                --card-bg: #1e1e1e;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
        }

        button {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            color: #4bb543;
        }
        
        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ NetKalkan Ayarları</h2>
        
        <div class="form-group">
            <label for="machineId">Cihaz / Sınıf Adı</label>
            <input type="text" id="machineId" placeholder="Örn: 8A-AkıllıTahta">
            <div class="hint">Bu isim, raporlamalarda bilgisayarı ayırt etmek için kullanılacaktır.</div>
        </div>

        <div class="form-group">
            <label for="serverUrl">Sunucu IP / URL Adresi</label>
            <input type="text" id="serverUrl" placeholder="Örn: http://192.168.1.100:5050">
            <div class="hint">NetKalkan sunucusunun çalıştığı bilgisayarın ağ üzerindeki IP adresi ve portu.</div>
        </div>

        <button id="saveBtn">Kaydet</button>
        <div id="status"></div>
    </div>

    <script src="options.js"></script>
</body>
</html>
